<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Kerala Today News: Breaking News, Editorials &amp; Media Updates</title>
  <meta name="description"
    content="Kerala Today News delivers breaking news, in-depth editorials, and timely updates. Your trusted source for journalism and comprehensive media coverage in Kerala.">
  <meta name="author" content="Kerala Today News" />
  <meta name="keywords"
    content="Kerala Today News, breaking news, editorials, journalism, media, news updates, Kerala news, local news, Malayalam news" />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <meta name="googlebot" content="index, follow" />

  <!-- Favicon and App Icons -->
  <link rel="icon" type="image/png" href="/lovable-uploads/kerala-today-logo.png">
  <link rel="apple-touch-icon" href="/lovable-uploads/kerala-today-logo.png" />
  <link rel="canonical" href="https://www.keralatoday.news/" />

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://graph.facebook.com" />

  <!-- Open Graph / Facebook -->
  <meta property="og:site_name" content="Kerala Today News" />


  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.keralatoday.news/" />
  <meta property="og:image" content="https://www.keralatoday.news/lovable-uploads/kerala-today-logo.png">
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Kerala Today News Logo" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@KeralaTodayNews" />
  <meta name="twitter:creator" content="@KeralaTodayNews" />


  <meta name="twitter:image" content="https://www.keralatoday.news/lovable-uploads/kerala-today-logo.png">
  <meta name="twitter:image:alt" content="Kerala Today News Logo" />

  <!-- Mobile App Configuration -->
  <meta name="theme-color" content="#dc2626" />
  <meta name="msapplication-TileColor" content="#dc2626" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Kerala Today News" />
  <meta name="format-detection" content="telephone=no" />

  <!-- Structured Data - Organization -->
  <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "NewsMediaOrganization",
        "name": "Kerala Today News",
        "alternateName": "KTN",
        "url": "https://www.keralatoday.news",
        "logo": {
          "@type": "ImageObject",
          "url": "https://www.keralatoday.news/lovable-uploads/kerala-today-logo.png",
          "width": 512,
          "height": 512
        },
        "sameAs": [
          "https://facebook.com/KeralaTodayNews"
        ],
        "description": "Kerala Today News delivers breaking news, in-depth editorials, and timely updates for the Kerala community.",
        "foundingDate": "2020",
        "address": {
          "@type": "PostalAddress",
          "addressRegion": "Kerala",
          "addressCountry": "IN"
        }
      }
    </script>

  <!-- Structured Data - WebSite for Sitelinks Search -->
  <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Kerala Today News",
        "url": "https://www.keralatoday.news",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://www.keralatoday.news/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  <meta property="og:title" content="Kerala Today News: Breaking News, Editorials &amp; Media Updates">
  <meta name="twitter:title" content="Kerala Today News: Breaking News, Editorials &amp; Media Updates">
  <meta property="og:description"
    content="Kerala Today News delivers breaking news, in-depth editorials, and timely updates. Your trusted source for journalism and comprehensive media coverage in Kerala.">
  <meta name="twitter:description"
    content="Kerala Today News delivers breaking news, in-depth editorials, and timely updates. Your trusted source for journalism and comprehensive media coverage in Kerala.">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
